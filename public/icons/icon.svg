<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Lifting Log">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Rounded background tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <rect x="0" y="0" width="512" height="220" rx="112" fill="#ffffff" opacity="0.06"/>

  <!-- Barbell mark, centered -->
  <g fill="#09090b" transform="translate(56, 192)">
    <!-- bar -->
    <rect x="32" y="56" width="336" height="20" rx="6"/>
    <!-- inner plates (large) -->
    <rect x="78" y="20" width="40" height="92" rx="8"/>
    <rect x="282" y="20" width="40" height="92" rx="8"/>
    <!-- outer plates (small) -->
    <rect x="44" y="40" width="26" height="52" rx="6"/>
    <rect x="330" y="40" width="26" height="52" rx="6"/>
    <!-- end caps -->
    <rect x="14" y="56" width="22" height="20" rx="5"/>
    <rect x="364" y="56" width="22" height="20" rx="5"/>
  </g>
</svg>
